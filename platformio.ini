; ============================================================
;  platformio.ini — Womo Energy Core v5.5.1
;  Ziel: ESP32-S3 DevKitC-1 N16R8 (16MB Flash, 8MB PSRAM)
;
;  Wichtige Versionsfestlegungen:
;   • platform @ ^6.9.0:  Arduino-Core 2.x (IDF 4.4)
;                          esp_task_wdt_init(uint32_t, bool) Signatur.
;                          Achtung: Arduino-Core 3.x (IDF 5) nutzt
;                          esp_task_wdt_config_t → andere Signatur!
;   • ESPAsyncWebServer:   ESP32Async-Fork (vormals me-no-dev war
;                          nicht mehr gepflegt). @^3.7.0 enthält
;                          verbesserte Thread-Safety (makeBuffer etc).
;   • AsyncTCP:            Passender ESP32Async-Fork, @^3.3.2.
;   • lib_ignore:          ESPAsyncTCP ausschließen (ESP8266-Fork,
;                          kollidiert mit AsyncTCP auf ESP32).
; ============================================================

[env:esp32-s3-devkitc-1]
platform          = espressif32 @ ^6.9.0
board             = esp32-s3-devkitc-1
framework         = arduino

; Flash & PSRAM
board_upload.flash_size         = 16MB
board_build.arduino.memory_type = qio_opi
board_build.flash_size    = 16MB
board_build.partitions    = partitions_16mb.csv
board_build.filesystem    = littlefs

; USB CDC (nativer USB-Port S3 für Seriellen Monitor)
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

monitor_speed     = 115200
monitor_filters   = esp32_exception_decoder

lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.7.0
    esp32async/AsyncTCP          @ ^3.3.2
    bblanchon/ArduinoJson        @ ^6.21.5
    FS
    SD
    LittleFS

lib_ignore =
    ESPAsyncTCP
